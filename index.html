<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Simulasi Panas TEG Dirichlet</title>

<style>
    body{
        font-family: Arial, sans-serif;
        background:#f4f4f4;
        text-align:center;
        margin:0;
        padding:20px;
    }

    h1{
        margin-bottom:5px;
    }

    canvas{
        background:white;
        border:1px solid #ccc;
        margin-top:20px;
    }

    .info{
        margin-top:10px;
        font-size:18px;
    }
</style>
</head>

<body>

<h1>Simulasi Transien Perambatan Panas Vertikal 1D</h1>
<p>Kondisi Batas Dirichlet - Kasus TEG</p>

<canvas id="canvas" width="700" height="700"></canvas>

<div class="info" id="timeText">
    Waktu: 0.000 detik
</div>

<script>

// ==========================================
// 1. PARAMETER FISIK
// ==========================================
const L = 0.02;
const alpha = 9.7e-5;

const T_hot = 463.0;
const T_cold = 373.0;
const T_init = 302.15;

// ==========================================
// 2. GRID DAN WAKTU
// ==========================================
const nx = 60;
const dx = L / (nx - 1);

const dt = 0.0004;
const t_total = 2.5;

const nt = Math.floor(t_total / dt);

const cfl = alpha * dt / (dx * dx);

if(cfl >= 0.5){
    alert("Simulasi tidak stabil! CFL >= 0.5");
}

// Posisi vertikal
let x = [];
for(let i=0;i<nx;i++){
    x.push(i * dx);
}

// ==========================================
// 3. INISIALISASI SUHU
// ==========================================
let T = new Array(nx).fill(T_init);

T[0] = T_hot;
T[nx-1] = T_cold;

// Menyimpan history animasi
let history = [];
let waktu = [];

history.push([...T]);
waktu.push(0);

// ==========================================
// 4. ITERASI NUMERIK
// ==========================================
for(let n=0; n<nt; n++){

    let T_new = [...T];

    for(let i=1; i<nx-1; i++){
        T_new[i] =
            T[i] +
            cfl * (T[i+1] - 2*T[i] + T[i-1]);
    }

    // Dirichlet Boundary
    T_new[0] = T_hot;
    T_new[nx-1] = T_cold;

    T = [...T_new];

    if(n % 25 === 0){
        history.push([...T]);
        waktu.push(n * dt);
    }
}

// ==========================================
// 5. CANVAS SETUP
// ==========================================
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const width = canvas.width;
const height = canvas.height;

// Margin grafik
const margin = 70;

// Konversi koordinat
function mapX(temp){
    return margin + (temp - 250) / (500 - 250) * (width - 2*margin);
}

function mapY(pos){
    return height - margin - (pos / L) * (height - 2*margin);
}

// ==========================================
// 6. GAMBAR AXIS
// ==========================================
function drawAxes(){

    ctx.strokeStyle = "black";
    ctx.lineWidth = 2;

    // Sumbu X
    ctx.beginPath();
    ctx.moveTo(margin, height-margin);
    ctx.lineTo(width-margin, height-margin);
    ctx.stroke();

    // Sumbu Y
    ctx.beginPath();
    ctx.moveTo(margin, height-margin);
    ctx.lineTo(margin, margin);
    ctx.stroke();

    // Label
    ctx.font = "16px Arial";
    ctx.fillText("Suhu / Temperatur (Kelvin)", width/2 - 100, height - 20);

    ctx.save();
    ctx.translate(20, height/2 + 100);
    ctx.rotate(-Math.PI/2);
    ctx.fillText("Posisi Vertikal Pelat (meter)", 0, 0);
    ctx.restore();
}

// ==========================================
// 7. GAMBAR PROFIL SUHU
// ==========================================
function drawFrame(frameIndex){

    ctx.clearRect(0,0,width,height);

    drawAxes();

    const data = history[frameIndex];

    ctx.strokeStyle = "red";
    ctx.lineWidth = 3;

    ctx.beginPath();

    for(let i=0; i<nx; i++){

        let px = mapX(data[i]);
        let py = mapY(x[i]);

        if(i === 0){
            ctx.moveTo(px, py);
        }else{
            ctx.lineTo(px, py);
        }
    }

    ctx.stroke();

    // Update waktu
    document.getElementById("timeText").innerHTML =
        "Waktu: " + waktu[frameIndex].toFixed(3) + " detik";
}

// ==========================================
// 8. ANIMASI
// ==========================================
let frame = 0;

function animate(){

    drawFrame(frame);

    frame++;

    if(frame >= history.length){
        frame = 0;
    }

    requestAnimationFrame(animate);
}

animate();

</script>

</body>
</html>
