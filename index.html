<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Simulasi Panas TEG Dirichlet</title>

<style>

body{
    font-family:Arial, sans-serif;
    background:#f2f2f2;
    text-align:center;
    margin:0;
    padding:20px;
}

h1{
    margin-bottom:5px;
}

canvas{
    background:white;
    border:1px solid #bbb;
    margin-top:20px;
}

.controls{
    margin-top:20px;
}

button{
    padding:10px 20px;
    font-size:16px;
    margin:5px;
    cursor:pointer;
}

.info{
    margin-top:15px;
    font-size:18px;
}

table{
    margin:25px auto;
    border-collapse:collapse;
    background:white;
    width:900px;
}

th, td{
    border:1px solid #444;
    padding:10px;
    text-align:center;
}

th{
    background:#ddd;
}

</style>
</head>

<body>

<h1>Simulasi Transien Perambatan Panas 1D</h1>
<p>Kondisi Batas Dirichlet - Kasus TEG</p>

<div class="controls">
    <button onclick="togglePause()" id="pauseBtn">
        Pause
    </button>

    <button onclick="resetAnimasi()">
        Reset
    </button>
</div>

<canvas id="canvas" width="700" height="700"></canvas>

<div class="info" id="timeText">
    Waktu: 0.000 detik
</div>

<table>
    <thead>
        <tr>
            <th>Posisi</th>
            <th>Suhu Numerik</th>
            <th>Suhu Steady-State</th>
        </tr>
    </thead>

    <tbody id="tableBody">
    </tbody>
</table>

<script>

// ==========================================
// PARAMETER FISIK
// ==========================================
const L = 0.02;
const alpha = 9.7e-5;

const T_hot = 463;
const T_cold = 373;
const T_init = 302.15;

// ==========================================
// GRID
// ==========================================
const nx = 60;
const dx = L/(nx-1);

const dt = 0.0004;
const t_total = 2.5;

const nt = Math.floor(t_total/dt);

const cfl = alpha*dt/(dx*dx);

if(cfl >= 0.5){
    alert("Simulasi tidak stabil!");
}

// ==========================================
// POSISI
// ==========================================
let x = [];

for(let i=0;i<nx;i++){
    x.push(i*dx);
}

// ==========================================
// INISIALISASI SUHU
// ==========================================
let T = new Array(nx).fill(T_init);

T[0] = T_hot;
T[nx-1] = T_cold;

// ==========================================
// HISTORY
// ==========================================
let history = [];
let waktu = [];

history.push([...T]);
waktu.push(0);

// ==========================================
// ITERASI NUMERIK
// ==========================================
for(let n=0;n<nt;n++){

    let T_new = [...T];

    for(let i=1;i<nx-1;i++){

        T_new[i] =
            T[i] +
            cfl*(T[i+1]-2*T[i]+T[i-1]);
    }

    // Dirichlet
    T_new[0] = T_hot;
    T_new[nx-1] = T_cold;

    T = [...T_new];

    if(n % 25 === 0){

        history.push([...T]);
        waktu.push(n*dt);
    }
}

// ==========================================
// CANVAS
// ==========================================
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const width = canvas.width;
const height = canvas.height;

const margin = 70;

// ==========================================
// MAPPING
// ==========================================
function mapX(temp){

    return margin +
        (temp-300)/(470-300)*
        (width-2*margin);
}

function mapY(pos){

    return height-margin -
        (pos/L)*(height-2*margin);
}

// ==========================================
// AXIS
// ==========================================
function drawAxes(){

    ctx.strokeStyle = "black";
    ctx.lineWidth = 2;

    // X
    ctx.beginPath();
    ctx.moveTo(margin,height-margin);
    ctx.lineTo(width-margin,height-margin);
    ctx.stroke();

    // Y
    ctx.beginPath();
    ctx.moveTo(margin,height-margin);
    ctx.lineTo(margin,margin);
    ctx.stroke();

    // Label
    ctx.font = "16px Arial";

    ctx.fillText(
        "Temperatur (K)",
        width/2 - 60,
        height-20
    );

    ctx.save();

    ctx.translate(25,height/2+90);
    ctx.rotate(-Math.PI/2);

    ctx.fillText(
        "Posisi Pelat (m)",
        0,
        0
    );

    ctx.restore();
}

// ==========================================
// STEADY STATE ANALITIK
// ==========================================
function steadyState(z){

    return T_hot - ((T_hot-T_cold)/L)*z;
}

// ==========================================
// UPDATE TABEL
// ==========================================
function updateTable(data){

    const tbody =
        document.getElementById("tableBody");

    tbody.innerHTML = "";

    const positions = [
        0,
        L/4,
        L/2,
        3*L/4,
        L
    ];

    const labels = [
        "z = 0",
        "z = L/4",
        "z = L/2",
        "z = 3L/4",
        "z = L"
    ];

    for(let i=0;i<positions.length;i++){

        let z = positions[i];

        let index =
            Math.round(z/dx);

        let numerical =
            data[index].toFixed(2);

        let analytic =
            steadyState(z).toFixed(2);

        tbody.innerHTML += `
        <tr>
            <td>${labels[i]}</td>
            <td>${numerical} K</td>
            <td>${analytic} K</td>
        </tr>
        `;
    }
}

// ==========================================
// FRAME
// ==========================================
function drawFrame(frameIndex){

    ctx.clearRect(0,0,width,height);

    drawAxes();

    const data = history[frameIndex];

    // garis numerik
    ctx.strokeStyle = "red";
    ctx.lineWidth = 3;

    ctx.beginPath();

    for(let i=0;i<nx;i++){

        let px = mapX(data[i]);
        let py = mapY(x[i]);

        if(i===0){
            ctx.moveTo(px,py);
        }else{
            ctx.lineTo(px,py);
        }
    }

    ctx.stroke();

    // garis steady-state
    ctx.strokeStyle = "blue";
    ctx.lineWidth = 2;
    ctx.setLineDash([6,6]);

    ctx.beginPath();

    for(let i=0;i<nx;i++){

        let Tss = steadyState(x[i]);

        let px = mapX(Tss);
        let py = mapY(x[i]);

        if(i===0){
            ctx.moveTo(px,py);
        }else{
            ctx.lineTo(px,py);
        }
    }

    ctx.stroke();

    ctx.setLineDash([]);

    // update waktu
    document.getElementById("timeText")
        .innerHTML =
        "Waktu: " +
        waktu[frameIndex].toFixed(3)
        + " detik";

    updateTable(data);
}

// ==========================================
// ANIMASI
// ==========================================
let frame = 0;
let paused = false;

function animate(){

    if(!paused){

        drawFrame(frame);

        frame++;

        if(frame >= history.length){
            frame = history.length-1;
        }
    }

    requestAnimationFrame(animate);
}

animate();

// ==========================================
// PAUSE
// ==========================================
function togglePause(){

    paused = !paused;

    document.getElementById("pauseBtn")
        .innerHTML =
        paused ? "Resume" : "Pause";
}

// ==========================================
// RESET
// ==========================================
function resetAnimasi(){

    frame = 0;
}

</script>

</body>
</html>
